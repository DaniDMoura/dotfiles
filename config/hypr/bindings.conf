bindd = SUPER SHIFT, Q, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker

bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT CTRL ALT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com"
bindd = SUPER SHIFT ALT, A, Claude, exec, omarchy-launch-webapp "https://claude.ai"
bindd = SUPER SHIFT, G, Whatsapp, exec, omarchy-launch-webapp "https://web.whatsapp.com"
bindd = SUPER SHIFT, R, Instagram, exec, omarchy-launch-webapp "https://instagram.com"
bindd = SUPER SHIFT, U, Udemy, exec, omarchy-launch-webapp "https://www.udemy.com/home/my-courses/learning/"

bindd = SUPER SHIFT, S, Code, exec, uwsm-app -- code
bindd = SUPER SHIFT, X, Intelij, exec, uwsm-app idea 

bind = SUPER SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") 
bind = SUPER SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") 
bind = SUPER SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 

unbind= SUPER, Z
bindd = SUPER, Z, Menu, exec, omarchy-menu


# Screenshots with hyprshot
# Unbind default screenshot keys from utilities.conf
unbind = , PRINT
unbind = SHIFT, PRINT

# Screenshot region with editing (like original omarchy-cmd-screenshot)
bindd = , PRINT, Screenshot region with editing, exec, hyprshot-helper region edit

# Screenshot active window
bindd = ALT, PRINT, Screenshot active window, exec, hyprshot-helper window save

# Screenshot current monitor/output
bindd = SHIFT, PRINT, Screenshot current monitor, exec, hyprshot-helper output save

# Screenshot to clipboard (no save)
bindd = CTRL, PRINT, Screenshot region to clipboard, exec, hyprshot-helper region clipboard

# Screenshot with editing and copy to clipboard
bindd = SUPER SHIFT, PRINT, Screenshot region edit + clipboard, exec, hyprshot-helper region edit-clipboard

